services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mock_interview
      POSTGRES_USER: mockuser
      POSTGRES_PASSWORD: mockpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockuser -d mock_interview"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  funasr:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.12
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        decoder_thread_num="$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 4)"
        if [ -z "$$decoder_thread_num" ] || [ "$$decoder_thread_num" -lt 1 ]; then
          decoder_thread_num=4
        fi
        multiple_io=16
        io_thread_num=$(( (decoder_thread_num + multiple_io - 1) / multiple_io ))
        /workspace/FunASR/runtime/websocket/build/bin/funasr-wss-server-2pass \
          --download-model-dir /workspace/models \
          --model-dir damo/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-onnx \
          --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx \
          --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx \
          --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx \
          --itn-dir thuduj12/fst_itn_zh \
          --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst \
          --decoder-thread-num "$$decoder_thread_num" \
          --model-thread-num 1 \
          --io-thread-num "$$io_thread_num" \
          --port 10095 \
          --hotword /workspace/FunASR/runtime/websocket/hotwords.txt
    ports:
      - "10095:10095"
    volumes:
      - funasr_models:/workspace/models
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/10095'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 25s

  cosyvoice2:
    build:
      context: ./docker/cosyvoice2-gpu
      dockerfile: Dockerfile
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /models/huggingface
      MODELSCOPE_CACHE: /models/modelscope
      TORCH_HOME: /models/torch
      COSYVOICE_VOICE: default_zh
      COSYVOICE_MODEL_DIR: iic/CosyVoice2-0.5B
      COSYVOICE_PROMPT_WAV: /opt/CosyVoice/asset/zero_shot_prompt.wav
      COSYVOICE_PROMPT_PITCH_SEMITONES: 0.0
      COSYVOICE_PROMPT_TEMPO: 1.0
      COSYVOICE_OVERRIDE_EMBEDDING: "false"
    ports:
      - "50000:50000"
    volumes:
      - cosyvoice_models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:50000/openapi.json > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 180
      start_period: 1800s

  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_KEEP_ALIVE: 24h
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  ollama_init:
    image: curlimages/curl:8.12.1
    command:
      - sh
      - -lc
      - |
        set -e
        max_retries=5
        retry_delay=30
        model="qwen3.5:2b"
        for attempt in $(seq 1 $max_retries); do
          echo "Pulling model $model (attempt $attempt/$max_retries)..."
          result=$(curl -fsS -X POST http://ollama:11434/api/pull \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$model\",\"stream\":false}" \
            2>&1)
          if [ $? -eq 0 ]; then
            echo "Model $model pulled successfully."
            echo "$result"
            exit 0
          fi
          echo "Attempt $attempt failed: $result"
          if [ $attempt -lt $max_retries ]; then
            echo "Retrying in ${retry_delay}s..."
            sleep $retry_delay
          fi
        done
        echo "Failed to pull model $model after $max_retries attempts."
        exit 1
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_API_KEY: ollama
      LLM_MODEL: qwen3.5:2b
      LLM_TIMEOUT_SECONDS: 90
      LLM_DISABLE_THINKING: "true"
      LLM_DEFAULT_PROFILE: local
      LLM_RESUME_PROFILE: ""
      LLM_RESUME_MODEL: ""
      LLM_INTERVIEW_PROFILE: ""
      LLM_INTERVIEW_MODEL: ""
      LLM_EVALUATION_PROFILE: ""
      LLM_EVALUATION_MODEL: ""
      LLM_VERIFIER_PROFILE: ""
      LLM_VERIFIER_MODEL: ""
      LLM_ROUTING_STRATEGY: balanced
      LLM_INTERVIEW_RAG_MAX_CHARS: 520
      LLM_INTERVIEW_RAG_CHUNK_MAX_CHARS: 220
      CLOUD_LLM_ENABLED: "false"
      CLOUD_LLM_BASE_URL: ""
      CLOUD_LLM_API_KEY: ""
      CLOUD_LLM_MODEL: ""
      CLOUD_LLM_TIMEOUT_SECONDS: 90
      CLOUD_LLM_DISABLE_THINKING: "false"
      STT_BACKEND: funasr-http
      FUNASR_BASE_URL: http://funasr:10095
      FUNASR_HEALTH_PATH: /healthz
      FUNASR_TIMEOUT_SECONDS: 20
      FUNASR_USE_ITN: "true"
      FUNASR_EXTRA_PAYLOAD: "{}"
      TTS_BACKEND: cosyvoice2-http
      COSYVOICE_BASE_URL: http://cosyvoice2:50000
      COSYVOICE_TTS_PATH: /inference_sft
      COSYVOICE_HEALTH_PATH: /openapi.json
      COSYVOICE_TIMEOUT_SECONDS: 90
      COSYVOICE_VOICE: default_zh
      COSYVOICE_MODE: sft
      COSYVOICE_INSTRUCT_TEXT: 用甜美、温柔、自然、清晰的中文女声播报，语气亲切，节奏流畅。
      COSYVOICE_SAMPLE_RATE: 22050
      COSYVOICE_SPEED: 1.6
      COSYVOICE_SEED: 3407
      COSYVOICE_WARM_TIMEOUT_SECONDS: 1.2
      COSYVOICE_WARM_KEEPALIVE_SECONDS: 90
      TTS_LEXICON_PATH: /app/knowledge_base/tts_lexicon.json
      TTS_ENABLE_EN_TO_ZH: "true"
      TTS_ENABLE_MARKDOWN_CLEAN: "true"
      TTS_ENABLE_AUTO_PUNCTUATION: "true"
      TTS_SENTENCE_MAX_CHARS: 120
      TTS_SENTENCE_SOFT_CHARS: 64
      TTS_REQUEST_TIMEOUT_SECONDS: 20
      TTS_FIRST_CHUNK_TIMEOUT_SECONDS: 6.5
      TTS_HEDGE_ENABLED: "true"
      TTS_HEDGE_DELAY_SECONDS: 0.85
      TTS_HEDGE_MAX_RACERS: 2
      COSYVOICE_EXTRA_PAYLOAD: "{}"
      DATABASE_URL: postgresql+asyncpg://mockuser:mockpassword@postgres:5432/mock_interview
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CORS_ALLOW_ALL: "false"
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      UPLOAD_DIR: /data/uploads
      CHROMA_DB_DIR: /data/chroma_db
      KNOWLEDGE_BASE_DIR: /app/knowledge_base
      TTS_CACHE_DIR: /data/uploads/tts_cache
      EMBEDDING_MODEL: BAAI/bge-m3
      HF_HOME: /data/huggingface
      SENTENCE_TRANSFORMERS_HOME: /data/sentence_transformers
    depends_on:
      postgres:
        condition: service_healthy
      funasr:
        condition: service_healthy
      cosyvoice2:
        condition: service_healthy
      ollama_init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: /api
      VITE_WS_BASE_URL: /ws
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
      - "5174:5174"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'exec 3<>/dev/tcp/127.0.0.1/5173'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  funasr_models:
  cosyvoice_models:
  ollama_data:
  backend_data:
  frontend_node_modules:
  postgres_data:
